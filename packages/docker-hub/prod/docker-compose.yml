services:
  postgres:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kactus" ]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5

  kactus-fin:
    build:
      context: ../../
      dockerfile: packages/docker-hub/Dockerfile.fin
    restart: always
    env_file: .env
    ports:
      - "17600:17600"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn kactus_fin.app:app --host 0.0.0.0 --port 17600 --workers 4 --log-level warning

  kactus-fin-gw:
    build:
      context: ../../
      dockerfile: packages/docker-hub/Dockerfile.fin-gw
    restart: always
    env_file: .env
    ports:
      - "17601:17601"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn kactus_fin_gateway.app:app --host 0.0.0.0 --port 17601 --workers 4 --log-level warning

volumes:
  postgres_data:
  redis_data:
