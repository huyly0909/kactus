[project]
name = "kactus-data"
version = "0.1.0"
description = "Data scraping, collection, and ETL pipelines"
requires-python = ">=3.12"
dependencies = [
    "kactus-common",
    "requests>=2.32.5",
]

[tool.uv.sources]
kactus-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kactus_data"]
