[project]
name = "kactus-common"
version = "0.1.0"
description = "Shared utilities: DuckDB client, Pydantic schemas, common models"
requires-python = ">=3.12"
dependencies = [
    "duckdb>=1.4.4",
    "pandas>=3.0.1",
    "pydantic>=2.12.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kactus_common"]
