[project]
name = "kactus-fin-gateway"
version = "0.1.0"
description = "Kactus API Gateway - Public-facing API server"
requires-python = ">=3.12"
dependencies = [
    "kactus-common",
    "fastapi>=0.100.0",
    "uvicorn[standard]>=0.20.0",
    "pydantic-settings>=2.0.0",
    "alembic>=1.18.4",
]

[tool.uv.sources]
kactus-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kactus_fin_gateway"]

[project.optional-dependencies]
dev = ["httpx>=0.24.0"]
