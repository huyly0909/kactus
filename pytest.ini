[pytest]
asyncio_mode = auto
testpaths =
    packages/kactus-common/tests
    packages/kactus-data/tests
    packages/kactus-fin/tests
    packages/kactus-fin-gateway/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --import-mode=importlib
    --tb=short
    --strict-markers
filterwarnings =
    error
    ignore::DeprecationWarning:tarfile
    ignore::ResourceWarning
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (requires Docker)
    unit: marks tests as unit tests