[tool:pytest]
testpaths = 
    packages/kactus-common/tests
    packages/kactus-data/tests
    packages/kactus-fin/tests
    packages/kactus-fin-gateway/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
import_mode = importlib
addopts = 
    -v 
    --tb=short
    --strict-markers
    --disable-warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests 